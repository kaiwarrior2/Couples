<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пары</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="content">
    <div class="main">

        <div class="state">
            <span class="state__title"><strong>Пары</strong></span>
            <span class="state__steps">Шаги: 0 шагов</span>
            <span class="state__time">Время: 60 сек</span>
        </div>

        <div class="board">
            <p class="board__subtitle"><strong>Настроить количество карточек (от 2 до 6)</strong></p>
            <input class="board__input" type="number" placeholder="По горизонтали / вертикали" min="2" max="6" step="2">
            <button class="board__button">Начать</button>
        </div>

    </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
